);

// Logo component
const PolyplasticsLogo = () => (
  <div className="flex items-center gap-3">
    <div className="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-blue-700 to-cyan-500 text-sm font-black text-white shadow-lg shadow-cyan-500/30">
      PP
    </div>
    <div>
      <p className="text-sm font-black uppercase tracking-[0.22em] text-slate-900 dark:text-slate-100">
        Polyplastics
      </p>
      <p className="text-[10px] font-semibold uppercase tracking-[0.26em] text-slate-500 dark:text-slate-400">
        Guest House Suite
      </p>
    </div>
  </div>
);

// Initial mock data
const initialUsers = [
  { id: 1, username: 'admin', password: 'admin123', role: 'Admin', plant: 'All', name: 'Admin User' },
  { id: 2, username: 'user1', password: 'user123', role: 'User', plant: 'Plant A', name: 'John Doe' },
  { id: 3, username: 'superadmin', password: 'super123', role: 'Super Admin', plant: 'All', name: 'Super Admin' },
  { id: 4, username: 'ceo', password: 'ceo123', role: 'Top Management', plant: 'All', name: 'CEO' },
];

const initialPlants = ['Plant A', 'Plant B', 'Plant C', 'Plant D'];

const initialGuestHouses = [
  { id: 1, name: 'Executive House A', plant: 'Plant A' },
  { id: 2, name: 'Staff Quarters A', plant: 'Plant A' },
  { id: 3, name: 'Executive House B', plant: 'Plant B' },
  { id: 4, name: 'Visitor Lodge B', plant: 'Plant B' },
  { id: 5, name: 'Executive House C', plant: 'Plant C' },
  { id: 6, name: 'Guest House D', plant: 'Plant D' },
];

const initialExpenses = [
  { id: 1, guestHouseId: 1, plant: 'Plant A', category: 'Food', amount: 15000, date: '2026-03-15', description: 'Monthly groceries', userId: 2 },
  { id: 2, guestHouseId: 1, plant: 'Plant A', category: 'Utilities', amount: 8000, date: '2026-03-10', description: 'Electricity bill', userId: 2 },
  { id: 3, guestHouseId: 2, plant: 'Plant A', category: 'Maintenance', amount: 12000, date: '2026-03-20', description: 'AC repair', userId: 2 },
  { id: 4, guestHouseId: 3, plant: 'Plant B', category: 'Food', amount: 18000, date: '2026-03-18', description: 'Catering services', userId: 1 },
  { id: 5, guestHouseId: 4, plant: 'Plant B', category: 'Miscellaneous', amount: 5000, date: '2026-03-22', description: 'Office supplies', userId: 1 },
  { id: 6, guestHouseId: 5, plant: 'Plant C', category: 'Utilities', amount: 9500, date: '2026-03-25', description: 'Water & electricity', userId: 1 },
  { id: 7, guestHouseId: 1, plant: 'Plant A', category: 'Food', amount: 11000, date: '2026-02-15', description: 'Monthly groceries', userId: 2 },
  { id: 8, guestHouseId: 3, plant: 'Plant B', category: 'Maintenance', amount: 25000, date: '2026-02-20', description: 'Plumbing work', userId: 1 },
];

const categories = ['Food', 'Maintenance', 'Utilities', 'Miscellaneous'];

const App = () => {
  const [darkMode, setDarkMode] = useState(false);
  const [currentUser, setCurrentUser] = useState(null);
  const [users, setUsers] = useState(initialUsers);
  const [plants, setPlants] = useState(initialPlants);
  const [guestHouses, setGuestHouses] = useState(initialGuestHouses);
  const [expenses, setExpenses] = useState(initialExpenses);
  const [activeTab, setActiveTab] = useState('dashboard');
  const [showModal, setShowModal] = useState(false);
  const [modalType, setModalType] = useState('');
  const [selectedItem, setSelectedItem] = useState(null);
  const [formData, setFormData] = useState({});
  const [filterPlant, setFilterPlant] = useState('All');
  const [filterGuestHouse, setFilterGuestHouse] = useState('All');
  const [filterCategory, setFilterCategory] = useState('All');
  const [filterDateFrom, setFilterDateFrom] = useState('');
  const [filterDateTo, setFilterDateTo] = useState('');
  const [showPassword, setShowPassword] = useState(false);

  useEffect(() => {
    if (darkMode) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  }, [darkMode]);

  // Authentication
  const handleLogin = (username, password) => {
    const user = users.find(u => u.username === username && u.password === password);
    if (user) {
      setCurrentUser(user);
      setActiveTab('dashboard');
      return true;
    }
    return false;
  };

  const handleLogout = () => {
    setCurrentUser(null);
    setActiveTab('dashboard');
    setFilterPlant('All');
    setFilterGuestHouse('All');
  };

  // Filter data based on user role
  const getAccessibleData = () => {
    if (!currentUser) return { guestHouses: [], expenses: [] };

    if (currentUser.role === 'User') {
      const userGuestHouses = guestHouses.filter(gh => gh.plant === currentUser.plant);
      const userExpenses = expenses.filter(e => e.plant === currentUser.plant);
      return { guestHouses: userGuestHouses, expenses: userExpenses };
    }

    return { guestHouses, expenses };
  };

  // CRUD Operations
  const handleAddExpense = (data) => {
    const guestHouse = guestHouses.find(gh => gh.id === parseInt(data.guestHouseId));
    const newExpense = {
      id: expenses.length + 1,
      ...data,
      plant: guestHouse.plant,
      userId: currentUser.id,
      amount: parseFloat(data.amount),
    };
    setExpenses([...expenses, newExpense]);
    setShowModal(false);
  };

  const handleEditExpense = (data) => {
    const guestHouse = guestHouses.find(gh => gh.id === parseInt(data.guestHouseId));
    setExpenses(expenses.map(e => 
      e.id === selectedItem.id 
        ? { ...e, ...data, plant: guestHouse.plant, amount: parseFloat(data.amount) }
        : e
    ));
    setShowModal(false);
  };

  const handleDeleteExpense = (id) => {
    setExpenses(expenses.filter(e => e.id !== id));
  };

  const handleAddUser = (data) => {
    const newUser = {
      id: users.length + 1,
      ...data,
    };
    setUsers([...users, newUser]);
    setShowModal(false);
  };

  const handleEditUser = (data) => {
    setUsers(users.map(u => u.id === selectedItem.id ? { ...u, ...data } : u));
    setShowModal(false);
  };

  const handleDeleteUser = (id) => {
    setUsers(users.filter(u => u.id !== id));
  };

  const handleEditGuestHouse = (data) => {
    setGuestHouses(guestHouses.map(gh => 
      gh.id === selectedItem.id ? { ...gh, name: data.name } : gh
    ));
    setShowModal(false);
  };

  // Export data
  const handleExport = () => {
    const { expenses: filteredExpenses } = getAccessibleData();
    const filtered = applyFilters(filteredExpenses);
    
    const csv = [
      ['Date', 'Plant', 'Guest House', 'Category', 'Amount', 'Description'],
      ...filtered.map(e => {
        const gh = guestHouses.find(g => g.id === e.guestHouseId);
        return [e.date, e.plant, gh?.name || '', e.category, e.amount, e.description];
      })
    ].map(row => row.join(',')).join('\n');

    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `expenses_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
  };

  // Apply filters
  const applyFilters = (expenseList) => {
    return expenseList.filter(e => {
      const matchPlant = filterPlant === 'All' || e.plant === filterPlant;
      const matchGH = filterGuestHouse === 'All' || e.guestHouseId === parseInt(filterGuestHouse);
      const matchCategory = filterCategory === 'All' || e.category === filterCategory;
      const matchDateFrom = !filterDateFrom || e.date >= filterDateFrom;
      const matchDateTo = !filterDateTo || e.date <= filterDateTo;
      return matchPlant && matchGH && matchCategory && matchDateFrom && matchDateTo;
    });
  };

  // Calculate statistics
  const calculateStats = (expenseList) => {
    const filtered = applyFilters(expenseList);
    
    const total = filtered.reduce((sum, e) => sum + e.amount, 0);
    
    const byCategory = categories.map(cat => ({
      category: cat,
      amount: filtered.filter(e => e.category === cat).reduce((sum, e) => sum + e.amount, 0)
    }));

    const byPlant = [...new Set(filtered.map(e => e.plant))].map(plant => ({
      plant,
      amount: filtered.filter(e => e.plant === plant).reduce((sum, e) => sum + e.amount, 0)
    }));

    const byGuestHouse = guestHouses
      .filter(gh => filtered.some(e => e.guestHouseId === gh.id))
      .map(gh => ({
        name: gh.name,
        amount: filtered.filter(e => e.guestHouseId === gh.id).reduce((sum, e) => sum + e.amount, 0)
      }));

    return { total, byCategory, byPlant, byGuestHouse, count: filtered.length };
  };

  if (!currentUser) {
    return <LoginScreen onLogin={handleLogin} darkMode={darkMode} setDarkMode={setDarkMode} />;
  }

  const { guestHouses: accessibleGuestHouses, expenses: accessibleExpenses } = getAccessibleData();
  const stats = calculateStats(accessibleExpenses);

  return (
    <div className={`min-h-screen transition-colors duration-300 ${darkMode ? 'dark' : ''}`}>
      <div className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-slate-100 dark:from-slate-950 dark:via-slate-900 dark:to-slate-950">
        {/* Header */}
        <header className="bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50 shadow-sm">
          <div className="max-w-7xl mx-auto px-6 py-4">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-4">
                <PolyplasticsLogo />
                <div className="h-8 w-px bg-slate-300 dark:bg-slate-700" />
                <div>
                  <h1 className="text-lg font-bold text-slate-900 dark:text-slate-100 tracking-tight">
                    Guest House Management
                  </h1>
                  <p className="text-xs text-slate-600 dark:text-slate-400">Creating Identities</p>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <div className="text-right">
                  <p className="text-sm font-semibold text-slate-900 dark:text-slate-100">{currentUser.name}</p>
                  <p className="text-xs text-slate-600 dark:text-slate-400">{currentUser.role} | {currentUser.plant}</p>
                </div>
                <button
                  onClick={() => setDarkMode(!darkMode)}
                  className="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors"
                >
                  {darkMode ? <Sun className="w-5 h-5 text-amber-500" /> : <Moon className="w-5 h-5 text-slate-700" />}
                </button>
                <button
                  onClick={handleLogout}
                  className="flex items-center gap-2 px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg transition-colors font-medium"
                >
                  <LogOut className="w-4 h-4" />
                  Logout
                </button>
              </div>
            </div>
          </div>
        </header>

        {/* Navigation */}
        <nav className="bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800">
          <div className="max-w-7xl mx-auto px-6">
            <div className="flex gap-1">
              <NavButton
                active={activeTab === 'dashboard'}
                onClick={() => setActiveTab('dashboard')}
                icon={<BarChart3 className="w-4 h-4" />}
                label="Dashboard"
              />
              <NavButton
                active={activeTab === 'expenses'}
                onClick={() => setActiveTab('expenses')}
                icon={<DollarSign className="w-4 h-4" />}
                label="Expenses"
              />
              {['Admin', 'Super Admin', 'Top Management'].includes(currentUser.role) && (
                <>
                  <NavButton
                    active={activeTab === 'users'}
                    onClick={() => setActiveTab('users')}
                    icon={<Users className="w-4 h-4" />}
                    label="Users"
                  />
                  <NavButton
                    active={activeTab === 'guesthouses'}
                    onClick={() => setActiveTab('guesthouses')}
                    icon={<Home className="w-4 h-4" />}
                    label="Guest Houses"
                  />
                </>
              )}
            </div>
          </div>
        </nav>

        {/* Main Content */}
        <main className="max-w-7xl mx-auto px-6 py-8">
          {activeTab === 'dashboard' && (
            <DashboardView
              currentUser={currentUser}
              stats={stats}
              expenses={accessibleExpenses}
              guestHouses={accessibleGuestHouses}
              darkMode={darkMode}
              filterPlant={filterPlant}
              setFilterPlant={setFilterPlant}
              filterGuestHouse={filterGuestHouse}
              setFilterGuestHouse={setFilterGuestHouse}
              filterCategory={filterCategory}
              setFilterCategory={setFilterCategory}
              filterDateFrom={filterDateFrom}
              setFilterDateFrom={setFilterDateFrom}
              filterDateTo={filterDateTo}
              setFilterDateTo={setFilterDateTo}
              plants={plants}
              applyFilters={applyFilters}
              handleExport={handleExport}
            />
          )}

          {activeTab === 'expenses' && (
            <ExpensesView
              expenses={accessibleExpenses}
              guestHouses={accessibleGuestHouses}
              currentUser={currentUser}
              onAdd={() => {
                setModalType('addExpense');
                setFormData({});
                setShowModal(true);
              }}
              onEdit={(expense) => {
                setModalType('editExpense');
                setSelectedItem(expense);
                setFormData(expense);
                setShowModal(true);
              }}
              onDelete={handleDeleteExpense}
              filterPlant={filterPlant}
              setFilterPlant={setFilterPlant}
              filterGuestHouse={filterGuestHouse}
              setFilterGuestHouse={setFilterGuestHouse}
              filterCategory={filterCategory}
              setFilterCategory={setFilterCategory}
              plants={plants}
              applyFilters={applyFilters}
            />
          )}

          {activeTab === 'users' && ['Admin', 'Super Admin', 'Top Management'].includes(currentUser.role) && (
            <UsersView
              users={users}
              plants={plants}
              onAdd={() => {
                setModalType('addUser');
                setFormData({});
                setShowModal(true);
              }}
              onEdit={(user) => {
                setModalType('editUser');
                setSelectedItem(user);
                setFormData(user);
                setShowModal(true);
              }}
              onDelete={handleDeleteUser}
            />
          )}

          {activeTab === 'guesthouses' && ['Admin', 'Super Admin', 'Top Management'].includes(currentUser.role) && (
            <GuestHousesView
              guestHouses={guestHouses}
              onEdit={(gh) => {
                setModalType('editGuestHouse');
                setSelectedItem(gh);
                setFormData({ name: gh.name });
                setShowModal(true);
              }}
            />
          )}
        </main>

        {/* Modal */}
        {showModal && (
          <Modal
            type={modalType}
            data={formData}
            guestHouses={accessibleGuestHouses}
            plants={plants}
            onClose={() => setShowModal(false)}
            onSubmit={(data) => {
              if (modalType === 'addExpense') handleAddExpense(data);
              if (modalType === 'editExpense') handleEditExpense(data);
              if (modalType === 'addUser') handleAddUser(data);
              if (modalType === 'editUser') handleEditUser(data);
              if (modalType === 'editGuestHouse') handleEditGuestHouse(data);
            }}
          />
        )}
      </div>
    </div>
  );
};

// Login Screen
const LoginScreen = ({ onLogin, darkMode, setDarkMode }) => {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [showPassword, setShowPassword] = useState(false);

        ))}
      </div>
    </div>
  );
};

// Modal Component
const Modal = ({ type, data, guestHouses, plants, onClose, onSubmit }) => {

    e.preventDefault();
    onSubmit(formData);
  };

    setFormData({ ...formData, [field]: value });
  };

  const getTitle = () => {
    switch (type) {
      case 'addExpense': return 'Add New Expense';
      case 'editExpense': return 'Edit Expense';
      case 'addUser': return 'Add New User';
      case 'editUser': return 'Edit User';
      case 'editGuestHouse': return 'Edit Guest House';
      default: return 'Modal';
    }

    <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">

        <div className="sticky top-0 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 p-6 flex items-center justify-between">
          <h3 className="text-2xl font-bold text-slate-900 dark:text-slate-100">{getTitle()}</h3>
          <button
            onClick={onClose}
            className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors"
          >
            <X className="w-5 h-5 text-slate-600 dark:text-slate-400" />
          </button>
        </div>

        <form onSubmit={handleSubmit} className="p-6 space-y-4">
          {(type === 'addExpense' || type === 'editExpense') && (
            <>
              <div>
                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                  Guest House
                </label>
                <select
                  value={formData.guestHouseId || ''}
                  onChange={(e) => handleChange('guestHouseId', e.target.value)}
                  className="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500"
                  required
                >
                  <option value="">Select Guest House</option>
                  {guestHouses.map(gh => (
                    <option key={gh.id} value={gh.id}>{gh.name} ({gh.plant})</option>
                  ))}
                </select>
              </div>
              <div>
                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                  Category
                </label>
                <select
                  value={formData.category || ''}
                  onChange={(e) => handleChange('category', e.target.value)}
                  className="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500"
                  required
                >
                  <option value="">Select Category</option>
                  {categories.map(cat => (
                    <option key={cat} value={cat}>{cat}</option>
                  ))}
                </select>
              </div>
              <div>
                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                  Amount (Rs.)
                </label>
                <input
                  type="number"
                  value={formData.amount || ''}
                  onChange={(e) => handleChange('amount', e.target.value)}
                  className="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500"
                  placeholder="0.00"
                  step="0.01"
                  required
                />
              </div>
              <div>
                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                  Date
                </label>
                <input
                  type="date"
                  value={formData.date || ''}
                  onChange={(e) => handleChange('date', e.target.value)}
                  className="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500"
                  required
                />
              </div>
              <div>
                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                  Description
                </label>
                <textarea
                  value={formData.description || ''}
                  onChange={(e) => handleChange('description', e.target.value)}

                  Full Name

                <input
                  type="text"

                  onChange={(e) => handleChange('name', e.target.value)}
                  className="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500"
                  placeholder="John Doe"
                  required
                />
              </div>
              <div>
                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                  Username
                </label>
                <input
                  type="text"
                  value={formData.username || ''}
                  onChange={(e) => handleChange('username', e.target.value)}
                  className="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500"
                  placeholder="johndoe"
                  required
                />
              </div>
              <div>
                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                  Password
                </label>
                <input
                  type="password"
                  value={formData.password || ''}
                  onChange={(e) => handleChange('password', e.target.value)}
                  className="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500"
                  placeholder="********"
                  required={type === 'addUser'}
                />
              </div>
              <div>
                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                  Role
                </label>
                <select
                  value={formData.role || ''}
                  onChange={(e) => handleChange('role', e.target.value)}

                  required
                >

              <div>
                <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                  Plant
                </label>
                <select
                  value={formData.plant || ''}
                  onChange={(e) => handleChange('plant', e.target.value)}
                  className="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500"
                  required
                >
                  <option value="">Select Plant</option>
                  {formData.role === 'User' ? (
                    plants.map(plant => (
                      <option key={plant} value={plant}>{plant}</option>
                    ))
                  ) : (
                    <option value="All">All Plants</option>
                  )}
                </select>
              </div>
            </>
          )}

          {type === 'editGuestHouse' && (
            <div>
              <label className="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
                Guest House Name
              </label>
              <input
                type="text"
                value={formData.name || ''}
                onChange={(e) => handleChange('name', e.target.value)}
                className="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-blue-500"
                placeholder="Guest House Name"
                required
              />

          )}

          <div className="flex gap-3 pt-4">
            <button
              type="button"
              onClick={onClose}
              className="flex-1 px-4 py-3 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 text-slate-900 dark:text-slate-100 rounded-lg transition-colors font-semibold"
            >
              Cancel
            </button>
            <button
              type="submit"
              className="flex-1 px-4 py-3 bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-700 hover:to-cyan-600 text-white rounded-lg transition-all font-semibold shadow-lg hover:shadow-xl"
            >
              {type.startsWith('add') ? 'Add' : 'Save'}
            </button>
          </div>
        </form>
      </div>
    </div>
  );
};

        <div className={`p-3 bg-gradient-to-br ${colorClasses[color]} rounded-lg`}>

// Chart Card
const ChartCard = ({ title, children, darkMode }) => (
  <div className="bg-white dark:bg-slate-900 rounded-xl p-6 shadow-lg border border-slate-200 dark:border-slate-800">
    <h3 className="text-lg font-bold text-slate-900 dark:text-slate-100 mb-6">{title}</h3>
    {children}
  </div>
);

// Bar Chart
const BarChart = ({ data, dataKey, valueKey, darkMode, color = 'blue' }) => {
  const maxValue = Math.max(...data.map(d => d[valueKey]), 1);
  
  const colorClasses = {
    blue: 'bg-gradient-to-r from-blue-500 to-cyan-500',
    emerald: 'bg-gradient-to-r from-emerald-500 to-teal-500',
    purple: 'bg-gradient-to-r from-purple-500 to-pink-500',
  };

  return (
    <div className="space-y-4">
      {data.map((item, index) => (
        <div key={index}>
          <div className="flex items-center justify-between mb-2">
            <span className="text-sm font-medium text-slate-700 dark:text-slate-300">{item[dataKey]}</span>
            <span className="text-sm font-bold text-slate-900 dark:text-slate-100">
              Rs. {item[valueKey].toLocaleString('en-IN')}
            </span>
          </div>
          <div className="h-3 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
            <div
              className={`h-full ${colorClasses[color]} rounded-full transition-all duration-500`}
              style={{ width: `${(item[valueKey] / maxValue) * 100}%` }}
            />
          </div>
        </div>
      ))}
    </div>
  );
};

// Pie Chart
const PieChartComponent = ({ data, darkMode }) => {
  const total = data.reduce((sum, item) => sum + item.amount, 0);
  const colors = ['#3b82f6', '#06b6d4', '#8b5cf6', '#ec4899'];

  if (total === 0) {
    return (
      <div className="flex min-h-[20rem] items-center justify-center rounded-xl border border-dashed border-slate-300 bg-slate-50/80 px-6 text-center text-sm font-medium text-slate-500 dark:border-slate-700 dark:bg-slate-900/40 dark:text-slate-400">
        No expense data for the selected filters.
      </div>
    );
  }

  let currentAngle = 0;

  return (
    <div className="flex items-center justify-center">
      <div className="relative w-64 h-64">
        <svg viewBox="0 0 200 200" className="transform -rotate-90">
          {data.map((item, index) => {
            const percentage = (item.amount / total) * 100;
            const angle = (percentage / 100) * 360;
            const startAngle = currentAngle;
            currentAngle += angle;

            const x1 = 100 + 80 * Math.cos((startAngle * Math.PI) / 180);
            const y1 = 100 + 80 * Math.sin((startAngle * Math.PI) / 180);
            const x2 = 100 + 80 * Math.cos((currentAngle * Math.PI) / 180);
            const y2 = 100 + 80 * Math.sin((currentAngle * Math.PI) / 180);

            const largeArc = angle > 180 ? 1 : 0;

            return (
              <path
                key={index}
                d={`M 100 100 L ${x1} ${y1} A 80 80 0 ${largeArc} 1 ${x2} ${y2} Z`}
                fill={colors[index % colors.length]}
                className="hover:opacity-80 transition-opacity"
              />
            );
          })}
          <circle cx="100" cy="100" r="50" fill="white" className="dark:fill-slate-900" />
        </svg>
        <div className="absolute inset-0 flex items-center justify-center">
          <div className="text-center">
            <p className="text-2xl font-bold text-slate-900 dark:text-slate-100">
              Rs. {total.toLocaleString('en-IN')}
            </p>
            <p className="text-xs text-slate-600 dark:text-slate-400">Total</p>
          </div>
        </div>
      </div>
      <div className="ml-8 space-y-2">
        {data.map((item, index) => (
          <div key={index} className="flex items-center gap-3">
            <div
              className="w-4 h-4 rounded-full"
              style={{ backgroundColor: colors[index % colors.length] }}
            />
            <div>
              <p className="text-sm font-medium text-slate-900 dark:text-slate-100">{item.category}</p>
              <p className="text-xs text-slate-600 dark:text-slate-400">
                Rs. {item.amount.toLocaleString('en-IN')} ({((item.amount / total) * 100).toFixed(1)}%)
              </p>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

// Helper functions

  const colors = {
    Food: 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400',
    Maintenance: 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-400',
    Utilities: 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400',

  return colors[category] || 'bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-400';
};

const getRoleColor = (role) => {

    'User': 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400',
